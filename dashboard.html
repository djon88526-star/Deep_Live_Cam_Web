<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Deep Live Cam AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .change {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .chart-container h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .user-list {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .user-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            flex: 1;
        }

        .user-info strong {
            display: block;
            margin-bottom: 5px;
        }

        .user-info small {
            opacity: 0.7;
        }

        .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .badge.high { background: rgba(76, 175, 80, 0.3); }
        .badge.medium { background: rgba(255, 193, 7, 0.3); }
        .badge.low { background: rgba(244, 67, 54, 0.3); }

        .heatmap-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .intent-bars {
            margin-top: 20px;
        }

        .intent-bar {
            margin-bottom: 15px;
        }

        .intent-bar label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .bar-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 0.85rem;
            font-weight: bold;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>📊 AI Analytics Dashboard</h1>

        <button class="refresh-btn" onclick="loadDashboard()">🔄 Refresh Data</button>

        <div class="stats-grid" id="stats-grid">
            <!-- Stats will be populated here -->
        </div>

        <div class="chart-container">
            <h2>📥 Download Button Clicks Analysis</h2>
            <div id="download-stats">
                <!-- Download stats will be populated here -->
            </div>
            <canvas id="downloadChart" width="800" height="300" style="margin-top: 20px;"></canvas>
        </div>

        <div class="chart-container">
            <h2>📈 User Engagement Over Time</h2>
            <canvas id="engagementChart" width="800" height="300"></canvas>
        </div>

        <div class="chart-container">
            <h2>🎯 User Intent Prediction</h2>
            <div class="intent-bars" id="intent-bars">
                <!-- Intent bars will be populated here -->
            </div>
        </div>

        <div class="chart-container">
            <h2>🔥 Click Heatmap</h2>
            <div class="heatmap-container" id="heatmap">
                <canvas id="heatmapCanvas" width="1200" height="800"></canvas>
            </div>
        </div>

        <div class="user-list">
            <h2>👥 Recent User Sessions</h2>
            <div id="user-sessions">
                <!-- User sessions will be populated here -->
            </div>
        </div>
    </div>

    <script>
        // Simple password protection
        const DASHBOARD_PASSWORD = 'admin123'; // Thay đổi mật khẩu này!

        function checkAccess() {
            const savedAuth = sessionStorage.getItem('dashboard_auth');
            if (savedAuth === DASHBOARD_PASSWORD) {
                return true;
            }

            const password = prompt('🔒 Enter Dashboard Password:');
            if (password === DASHBOARD_PASSWORD) {
                sessionStorage.setItem('dashboard_auth', password);
                return true;
            } else {
                alert('❌ Incorrect password!');
                window.location.href = 'index.html';
                return false;
            }
        }

        if (!checkAccess()) {
            document.body.innerHTML = '<h1 style="text-align:center; margin-top:50px;">Access Denied</h1>';
        }

        function loadDashboard() {
            const analyticsData = JSON.parse(localStorage.getItem('dlc_analytics') || '[]');

            if (analyticsData.length === 0) {
                alert('No analytics data available yet. Visit the main page first!');
                return;
            }

            // Calculate aggregate stats
            const totalSessions = analyticsData.length;
            const totalEvents = analyticsData.reduce((sum, session) => sum + session.events.length, 0);
            const avgEngagement = Math.round(analyticsData.reduce((sum, session) => sum + session.engagementScore, 0) / totalSessions);
            const avgTimeOnPage = Math.round(analyticsData.reduce((sum, session) => sum + session.behaviorData.timeOnPage, 0) / totalSessions);

            // Populate stats
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h3>Total Sessions</h3>
                    <div class="value">${totalSessions}</div>
                    <div class="change">Last 10 sessions</div>
                </div>
                <div class="stat-card">
                    <h3>Total Events</h3>
                    <div class="value">${totalEvents}</div>
                    <div class="change">All tracked interactions</div>
                </div>
                <div class="stat-card">
                    <h3>Avg Engagement</h3>
                    <div class="value">${avgEngagement}%</div>
                    <div class="change">User engagement score</div>
                </div>
                <div class="stat-card">
                    <h3>Avg Time on Page</h3>
                    <div class="value">${avgTimeOnPage}s</div>
                    <div class="change">Average session duration</div>
                </div>
            `;

            // Show download stats
            showDownloadStats(analyticsData);

            // Draw engagement chart
            drawEngagementChart(analyticsData);

            // Show user intent
            showUserIntent(analyticsData[analyticsData.length - 1]);

            // Draw heatmap
            drawHeatmap(analyticsData);

            // Show user sessions
            showUserSessions(analyticsData);
        }

        function showDownloadStats(data) {
            // Aggregate all download clicks
            const downloadClicks = {
                lite: 0,
                full: 0,
                hero: 0,
                other: 0
            };

            const downloadDetails = [];

            data.forEach(session => {
                session.events.forEach(event => {
                    if (event.event === 'download_click') {
                        const category = event.data.buttonCategory || 'other';
                        downloadClicks[category] = (downloadClicks[category] || 0) + 1;
                        downloadDetails.push({
                            button: event.data.button,
                            category: category,
                            timestamp: event.timestamp,
                            section: event.data.section,
                            userId: session.userId
                        });
                    }
                });
            });

            const totalClicks = Object.values(downloadClicks).reduce((a, b) => a + b, 0);

            // Display stats
            const container = document.getElementById('download-stats');
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                    <div style="background: rgba(0, 212, 255, 0.1); padding: 20px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3);">
                        <div style="font-size: 2rem; font-weight: bold; color: #00d4ff;">${downloadClicks.lite}</div>
                        <div style="font-size: 0.9rem; opacity: 0.8;">Lite Version Clicks</div>
                        <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">${totalClicks > 0 ? Math.round((downloadClicks.lite / totalClicks) * 100) : 0}% of total</div>
                    </div>
                    <div style="background: rgba(112, 0, 255, 0.1); padding: 20px; border-radius: 10px; border: 1px solid rgba(112, 0, 255, 0.3);">
                        <div style="font-size: 2rem; font-weight: bold; color: #7000ff;">${downloadClicks.full}</div>
                        <div style="font-size: 0.9rem; opacity: 0.8;">Full Bundle Clicks</div>
                        <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">${totalClicks > 0 ? Math.round((downloadClicks.full / totalClicks) * 100) : 0}% of total</div>
                    </div>
                    <div style="background: rgba(255, 0, 255, 0.1); padding: 20px; border-radius: 10px; border: 1px solid rgba(255, 0, 255, 0.3);">
                        <div style="font-size: 2rem; font-weight: bold; color: #ff00ff;">${downloadClicks.hero}</div>
                        <div style="font-size: 0.9rem; opacity: 0.8;">Hero Button Clicks</div>
                        <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">${totalClicks > 0 ? Math.round((downloadClicks.hero / totalClicks) * 100) : 0}% of total</div>
                    </div>
                    <div style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2);">
                        <div style="font-size: 2rem; font-weight: bold;">${totalClicks}</div>
                        <div style="font-size: 0.9rem; opacity: 0.8;">Total Download Clicks</div>
                        <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">All buttons combined</div>
                    </div>
                </div>

                <div style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 10px; max-height: 300px; overflow-y: auto;">
                    <h3 style="margin-bottom: 15px; font-size: 1.1rem;">📋 Recent Download Clicks</h3>
                    ${downloadDetails.slice(-10).reverse().map(detail => {
                        const date = new Date(detail.timestamp).toLocaleString();
                        const colorMap = {
                            lite: '#00d4ff',
                            full: '#7000ff',
                            hero: '#ff00ff',
                            other: '#ffffff'
                        };
                        return `
                            <div style="padding: 12px; margin-bottom: 8px; background: rgba(255, 255, 255, 0.03); border-radius: 8px; border-left: 3px solid ${colorMap[detail.category]};">
                                <div style="font-weight: bold; margin-bottom: 5px;">${detail.button}</div>
                                <div style="font-size: 0.85rem; opacity: 0.7;">
                                    <span>👤 ${detail.userId.substring(0, 15)}...</span> •
                                    <span>📍 ${detail.section}</span> •
                                    <span>🕐 ${date}</span>
                                </div>
                            </div>
                        `;
                    }).join('') || '<div style="opacity: 0.5; text-align: center; padding: 20px;">No download clicks yet</div>'}
                </div>
            `;

            // Draw download chart
            drawDownloadChart(downloadClicks);
        }

        function drawDownloadChart(downloadClicks) {
            const canvas = document.getElementById('downloadChart');
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const data = [
                { label: 'Lite Version', value: downloadClicks.lite, color: '#00d4ff' },
                { label: 'Full Bundle', value: downloadClicks.full, color: '#7000ff' },
                { label: 'Hero Button', value: downloadClicks.hero, color: '#ff00ff' },
                { label: 'Other', value: downloadClicks.other, color: '#ffffff' }
            ];

            const total = data.reduce((sum, item) => sum + item.value, 0);
            if (total === 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('No download data yet', canvas.width / 2, canvas.height / 2);
                return;
            }

            const barWidth = 60;
            const maxHeight = canvas.height - 80;
            const spacing = (canvas.width - (data.length * barWidth)) / (data.length + 1);

            data.forEach((item, index) => {
                const x = spacing + index * (barWidth + spacing);
                const height = (item.value / Math.max(...data.map(d => d.value))) * maxHeight;
                const y = canvas.height - height - 40;

                // Draw bar
                ctx.fillStyle = item.color;
                ctx.fillRect(x, y, barWidth, height);

                // Draw value
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(item.value, x + barWidth / 2, y - 10);

                // Draw label
                ctx.font = '12px Arial';
                ctx.fillText(item.label, x + barWidth / 2, canvas.height - 20);

                // Draw percentage
                const percentage = Math.round((item.value / total) * 100);
                ctx.font = '11px Arial';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fillText(`${percentage}%`, x + barWidth / 2, canvas.height - 5);
            });
        }

        function drawEngagementChart(data) {
            const canvas = document.getElementById('engagementChart');
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 40;
            const chartWidth = canvas.width - padding * 2;
            const chartHeight = canvas.height - padding * 2;

            // Draw axes
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, canvas.height - padding);
            ctx.lineTo(canvas.width - padding, canvas.height - padding);
            ctx.stroke();

            // Draw data
            if (data.length > 1) {
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 3;
                ctx.beginPath();

                data.forEach((session, index) => {
                    const x = padding + (index / (data.length - 1)) * chartWidth;
                    const y = canvas.height - padding - (session.engagementScore / 100) * chartHeight;

                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }

                    // Draw point
                    ctx.fillStyle = '#00d4ff';
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.stroke();
            }

            // Labels
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '12px Arial';
            ctx.fillText('Engagement Score', 10, 20);
            ctx.fillText('Sessions', canvas.width / 2 - 30, canvas.height - 10);
        }

        function showUserIntent(latestSession) {
            if (!latestSession || !latestSession.userIntent) return;

            const intentBars = document.getElementById('intent-bars');
            const intents = latestSession.userIntent;

            intentBars.innerHTML = Object.keys(intents).map(key => {
                const value = Math.round(intents[key]);
                return `
                    <div class="intent-bar">
                        <label>${key.replace(/_/g, ' ').toUpperCase()}</label>
                        <div class="bar-bg">
                            <div class="bar-fill" style="width: ${value}%">${value}%</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function drawHeatmap(data) {
            const canvas = document.getElementById('heatmapCanvas');
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Aggregate all clicks
            const allClicks = [];
            data.forEach(session => {
                if (session.behaviorData.heatmapData) {
                    allClicks.push(...session.behaviorData.heatmapData);
                }
            });

            // Draw heatmap
            allClicks.forEach(point => {
                const gradient = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 30);
                gradient.addColorStop(0, 'rgba(255, 0, 0, 0.6)');
                gradient.addColorStop(0.5, 'rgba(255, 255, 0, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 255, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(point.x - 30, point.y - 30, 60, 60);
            });
        }

        function showUserSessions(data) {
            const container = document.getElementById('user-sessions');

            container.innerHTML = data.slice(-5).reverse().map(session => {
                const engagementLevel = session.engagementScore > 70 ? 'high' : session.engagementScore > 40 ? 'medium' : 'low';
                const date = new Date(session.timestamp).toLocaleString();

                return `
                    <div class="user-item">
                        <div class="user-info">
                            <strong>${session.userId.substring(0, 20)}...</strong>
                            <small>${session.userProfile.device} • ${session.userProfile.browser} • ${date}</small>
                        </div>
                        <div>
                            <span class="badge ${engagementLevel}">Engagement: ${session.engagementScore}%</span>
                            <span class="badge">Time: ${session.behaviorData.timeOnPage}s</span>
                            <span class="badge">Events: ${session.events.length}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
